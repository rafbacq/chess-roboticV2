repos:
  - repo: local
    hooks:
      - id: pytest-unit
        name: Run unit tests
        entry: .venv/Scripts/python.exe -m pytest -q tests/ chess_core/tests/ board_state/tests/ perception/tests/ calibration/tests/ robot_model/tests/ motion_planning/tests/ manipulation/tests/ execution/tests/ simulation/tests/ learning/tests/ ui_tools/tests/ --tb=short
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: ruff-check
        name: Ruff lint check
        entry: .venv/Scripts/python.exe -m ruff check
        language: system
        types: [python]
        stages: [pre-commit]
