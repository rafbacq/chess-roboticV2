; PlatformIO configuration for Chess Gantry Robot firmware
;
; Board: Raspberry Pi Pico (RP2040)
; Framework: Arduino (Earle Philhower core)
;
; Usage:
;   pio run              # Build
;   pio run -t upload    # Flash via USB
;   pio device monitor   # Serial monitor

[env:pico]
platform = raspberrypi
board = pico
framework = arduino

; Use the Earle Philhower Arduino-Pico core
board_build.core = earlephilhower

; Serial monitor baud rate (must match firmware)
monitor_speed = 115200

; Libraries
lib_deps =
    waspinator/AccelStepper@^1.64

; Build flags
build_flags =
    -D ARDUINO_ARCH_RP2040
    ; Uncomment for DRV8825 instead of A4988:
    ; -D USE_DRV8825

; Upload settings
upload_protocol = picotool

; Code quality
check_tool = cppcheck
check_flags =
    cppcheck: --enable=all --suppress=missingInclude
