# Gantry Hardware Configuration
# ==============================
#
# Stepper-based XYZ gantry with electromagnet end-effector.
# This config is loaded by GantryConfig in robot_model/gantry_driver.py.

serial:
  port: "COM3"            # Windows; /dev/ttyACM0 in WSL2
  baudrate: 115200

board:
  # Origin of A1 square corner relative to home position (mm)
  origin_x_mm: 30.0
  origin_y_mm: 30.0
  # Side length of one chess square (mm)
  square_size_mm: 33.0    # Standard tournament: 50-65mm
                          # Adjust after calibration

z_heights:
  safe_mm: 50.0           # Transit height (clear all pieces)
  board_surface_mm: 5.0   # Board surface level
  pickup_mm: 2.0          # Magnet engagement height
  place_mm: 3.0           # Piece release height

tray:
  x_mm: 270.0             # Captured-piece tray position
  y_mm: 150.0

motion:
  move_timeout_s: 15.0
  keepalive_interval_s: 1.0

safety:
  x_min_mm: 0.0
  x_max_mm: 300.0
  y_min_mm: 0.0
  y_max_mm: 300.0
  z_min_mm: 0.0
  z_max_mm: 60.0
  max_magnet_on_duration_s: 60.0
  halt_response_ms: 100.0

# Backend selection
backend: "gantry"         # "gantry" or "simulated"
simulated: false          # True = use GantrySimAdapter instead of real serial
